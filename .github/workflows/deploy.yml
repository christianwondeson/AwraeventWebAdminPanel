name: Deploy to VPS

on:
  push:
    branches: ["master"]

concurrency:
  group: deploy-master
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy over SSH (git pull on server)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # If VPS_SSH_PORT is unset, use 22. If set, value must be a JSON number (e.g. 2222).
          port: ${{ secrets.VPS_SSH_PORT != '' && fromJSON(secrets.VPS_SSH_PORT) || 22 }}
          command_timeout: 15m
          # Must be false: with true, drone-ssh runs one line at a time and exits on any
          # non-zero between lines — that breaks multiline if/fi (e.g. composer.json block).
          script_stop: false
          script: |
            set -euo pipefail

            APP_DIR="${{ secrets.VPS_APP_DIR }}"
            APP_DIR="$(printf '%s' "$APP_DIR" | tr -d '\r\n')"
            BRANCH="master"

            if [ -z "$APP_DIR" ]; then
              echo "VPS_APP_DIR secret is required (e.g. /var/www/awraevents)"
              exit 1
            fi

            if [ ! -d "$APP_DIR" ]; then
              echo "VPS_APP_DIR is not a directory: $APP_DIR"
              exit 1
            fi

            cd "$APP_DIR"

            # www-data-owned files under images/ (and similar) break git reset --hard unless
            # the deploy user can reclaim the tree first (passwordless sudo chown on the VPS helps).
            sudo -n chown -R "$(whoami):$(whoami)" "$APP_DIR" 2>/dev/null || chown -R "$(whoami):$(whoami)" "$APP_DIR" 2>/dev/null || true

            # Make sure origin exists and points to GitHub
            git remote -v

            # Deploy exact remote state
            git fetch --prune origin
            git reset --hard "origin/${BRANCH}"

            mkdir -p images/event images/category images/gallery images/sponsore images/cover images/website
            sudo -n chown -R www-data:www-data images 2>/dev/null || true
            sudo chmod -R ug+rwX images 2>/dev/null || chmod -R ug+rwX images 2>/dev/null || true

            # Optional: composer install (only if a composer.json exists at project root)
            if [ -f composer.json ]; then
              if command -v composer >/dev/null 2>&1; then
                composer install --no-interaction --no-dev --prefer-dist --optimize-autoloader
              else
                echo "composer.json found but composer not installed on server; skipping."
              fi
            fi

            # Optional: reload PHP-FPM if available (non-fatal)
            if command -v systemctl >/dev/null 2>&1; then
              systemctl reload php8.2-fpm 2>/dev/null || true
              systemctl reload php8.1-fpm 2>/dev/null || true
              systemctl reload php8.0-fpm 2>/dev/null || true
            fi
