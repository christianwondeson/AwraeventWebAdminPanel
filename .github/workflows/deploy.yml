name: Deploy to VPS

on:
  push:
    branches: ["master"]

concurrency:
  group: deploy-master
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          : "${VPS_HOST:?Missing secret VPS_HOST}"
          : "${VPS_USER:?Missing secret VPS_USER}"
          : "${VPS_SSH_KEY:?Missing secret VPS_SSH_KEY}"
          : "${VPS_APP_DIR:?Missing secret VPS_APP_DIR}"
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}

      # appleboy: port must be integer; command_timeout avoids long git fetch dying early.
      - name: Deploy over SSH (git pull on server)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 15m
          script_stop: true
          script: |
            set -euo pipefail

            APP_DIR="${{ secrets.VPS_APP_DIR }}"
            APP_DIR="$(printf '%s' "$APP_DIR" | tr -d '\r\n')"
            BRANCH="master"
            WEB_USER="www-data"

            if [ -z "$APP_DIR" ]; then
              echo "VPS_APP_DIR secret is required (absolute path to the git clone, e.g. /var/www/awraevent)"
              exit 1
            fi

            if [ ! -d "$APP_DIR" ]; then
              echo "VPS_APP_DIR is not a directory: $APP_DIR"
              echo "Listing /var/www (set VPS_APP_DIR to the folder that contains .git):"
              ls -la /var/www 2>/dev/null || true
              exit 1
            fi

            cd "$APP_DIR"
            echo "==> deploy: $(pwd) as $(whoami)"

            # PHP-FPM owns images/ after uploads → git cannot unlink during reset --hard.
            # Passwordless sudo for chown helps: deploy ALL=(ALL) NOPASSWD: /bin/chown
            if [ -d images ]; then
              if sudo -n chown -R "$(whoami):$(whoami)" images 2>/dev/null; then
                echo "==> reclaimed images/ (sudo chown)"
              elif chown -R "$(whoami):$(whoami)" images 2>/dev/null; then
                echo "==> reclaimed images/ (no sudo)"
              else
                echo "==> WARN: could not chown images/ — if reset fails, run on VPS: sudo chown -R USER:USER $APP_DIR/images"
              fi
            fi

            echo "==> git fetch / reset"
            git remote -v
            git fetch --prune origin
            git reset --hard "origin/${BRANCH}"

            mkdir -p images/event images/category images/gallery images/sponsore images/cover images/website
            if sudo -n chown -R "${WEB_USER}:${WEB_USER}" images 2>/dev/null; then
              echo "==> images/ -> ${WEB_USER}"
              sudo chmod -R ug+rwX images 2>/dev/null || echo "==> WARN: sudo chmod skipped (OK if chown is enough)"
            else
              chmod -R g+rwX images 2>/dev/null || chmod -R u+rwX images 2>/dev/null || true
            fi

            if [ -f composer.json ] && command -v composer >/dev/null 2>&1; then
              echo "==> composer (best effort)"
              composer install --no-interaction --no-dev --prefer-dist --optimize-autoloader || echo "==> WARN: composer failed; continuing"
            elif [ -f composer.json ]; then
              echo "==> composer.json present; composer not in PATH — skip"
            fi

            if command -v systemctl >/dev/null 2>&1; then
              systemctl reload php8.2-fpm 2>/dev/null || true
              systemctl reload php8.1-fpm 2>/dev/null || true
              systemctl reload php8.0-fpm 2>/dev/null || true
            fi

            echo "==> deploy OK"
